# .NET MAUI / Xamarin.Android — Khepri

# Keep all classes in the app's Java package
-keep class com.binerdy.khepri.** { *; }

# Mono runtime
-keep class mono.** { *; }
-keep class java.** { *; }
-keep class javax.** { *; }

# Android components
-keep public class * extends android.app.Activity
-keep public class * extends android.app.Application
-keep public class * extends android.app.Service
-keep public class * extends android.content.BroadcastReceiver
-keep public class * extends android.content.ContentProvider

# Parcelable
-keep class * implements android.os.Parcelable {
    public static final android.os.Parcelable$Creator *;
}

# Serializable
-keepnames class * implements java.io.Serializable
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    !static !transient <fields>;
    !private <fields>;
    !private <methods>;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

# Google Play Billing (Xamarin.Android.Google.BillingClient)
-keep class com.android.billingclient.** { *; }
-keep interface com.android.billingclient.** { *; }

# AndroidX FileProvider (used for export share sheet)
-keep class androidx.core.content.FileProvider { *; }

# AndroidX Core (IntentCompat and others)
-keep class androidx.core.content.IntentCompat { *; }
-keep class androidx.core.** { *; }

# AndroidX Camera (CommunityToolkit.Maui.Camera)
-keep class androidx.camera.** { *; }
-keep interface androidx.camera.** { *; }

# Suppress notes for dynamically referenced classes
-dontnote **
